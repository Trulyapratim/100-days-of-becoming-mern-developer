<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>getElementById</title>
  <script type="text/javascript">
    function bodyLoad(){
      document.getElementById("poster").src="../../src/images/PW-IOI. jpeg"; // .src is used to set the source of the image.
      document.getElementById('btnRegister').value = "Register"; // .value is used to set the value of the button.
      document.getElementById('btnLogin').value = "Login";
    }
  </script>
</head>
<body onload = "bodyLoad()">  
  <div class="imgDiv">
    <img width="100" height="100" border="1" name="poster" id="poster" src="" alt="">
  </div>
  <div>
    <form name="frmRegister">
      <h3>Register</h3>
      Username <input type="text" id="username">
      <br><br>
      password <input type="password" name="password">
      <br>
      <input type="button" name ="btnRegister" id="btnRegister">
    </form>
  </div>

  <div>
    <form name="frmLogin">
      <h3>Login</h3>
      Email <input type="email" name ="login">
      <br>
      <input type="button" name=" btnLogin" id = "btnLogin">
    </form>
  </div>
</body>
</html>
